# Credit: Workflow configs based on https://github.com/Wynntils/Wynntils

name: Release & Deploy

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
      skipped: ${{ steps.changelog.outputs.skipped }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up version.json
        run: echo "{\"version\":\"$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')\"}" > version.json

      - name: Install changelog dependencies
        run: npm install conventional-changelog-conventionalcommits@7.0.2

      - name: Generate Changelog (dry run)
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          skip-commit: true
          skip-tag: true
          github-token: ${{ secrets.PRIVATE_TOKEN }}
          config-file-path: ./.github/.config.js
          version-file: ./version.json
          preset: conventionalcommits
          skip-version-file: true
          skip-git-pull: true
          skip-on-empty: false

      - name: Bump Cargo.toml version
        if: ${{ steps.changelog.outputs.skipped != 'true' }}
        run: |
          VERSION=${{ steps.changelog.outputs.tag }}
          VERSION=${VERSION#v}
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" Cargo.toml

      - name: Upload patched Cargo.toml
        if: ${{ steps.changelog.outputs.skipped != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-cargo-toml
          path: Cargo.toml

  build:
    name: Build
    needs: changelog
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      cargo-build-args: '--release'
      upload-binary: true
      binary-artifact-name: 'pwr-bot'
      binary-artifact-path: 'target/release/pwr-bot'
      export-docker-image: true

  publish-changelog:
    name: Publish Changelog Commit
    needs: [changelog, build]
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    outputs:
      tag: ${{ steps.commit.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up version.json
        run: echo "{\"version\":\"$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')\"}" > version.json

      - name: Download patched Cargo.toml
        uses: actions/download-artifact@v4
        with:
          name: patched-cargo-toml
          path: .

      - name: Install changelog dependencies
        run: npm install conventional-changelog-conventionalcommits@7.0.2

      - name: Commit, Tag, Push
        id: commit
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.PRIVATE_TOKEN }}
          git-user-name: "faz-bot"
          git-user-email: "mail@fazuh.com"
          config-file-path: ./.github/.config.js
          version-file: ./version.json
          preset: conventionalcommits
          skip-version-file: true
          skip-git-pull: true
          skip-on-empty: false

  push-image:
    name: Docker Build & Push
    needs: [changelog, build, publish-changelog]
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load -i /tmp/docker-image.tar

      - name: Set lowercase repo owner
        id: repo
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        run: |
          docker tag pwr-bot:build ghcr.io/${{ steps.repo.outputs.owner }}/pwr-bot:latest
          docker tag pwr-bot:build ghcr.io/${{ steps.repo.outputs.owner }}/pwr-bot:${{ needs.changelog.outputs.tag }}
          docker push ghcr.io/${{ steps.repo.outputs.owner }}/pwr-bot:latest
          docker push ghcr.io/${{ steps.repo.outputs.owner }}/pwr-bot:${{ needs.changelog.outputs.tag }}

  release-github:
    name: Release to GitHub
    needs: [changelog, build, publish-changelog]
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pwr-bot
          path: target/release

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.tag }}
          body: ${{ needs.changelog.outputs.changelog }}
          files: target/release/pwr-bot

      - name: Post Release on Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          embed-color: "9498256"
          embed-title: "pwr-bot ${{ needs.changelog.outputs.tag }}"
          embed-description: ${{ needs.changelog.outputs.changelog }}
          embed-url: ${{ steps.release.outputs.url }}
          embed-timestamp: ${{ github.event.head_commit.timestamp }}
